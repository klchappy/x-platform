server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolves x-api at request time, not start time.
    # Without this, nginx fails to start if x-api isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy /v1/* to internal x-api service.
    # Using a variable forces resolution at request time (needs resolver above).
    location /v1/ {
        set $api_upstream "x-api:4250";
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Only catch true upstream/network errors; pass API's own 4xx/5xx through.
        proxy_intercept_errors off;
        error_page 502 504 = @api_down;
    }

    location = /api-health {
        set $api_upstream "x-api:4250";
        proxy_pass http://$api_upstream/health;
        proxy_set_header Host $host;
        access_log off;
        # Only catch true upstream/network errors; pass API's own 4xx/5xx through.
        proxy_intercept_errors off;
        error_page 502 504 = @api_down;
    }

    location @api_down {
        default_type application/json;
        return 503 '{"error":{"message":"API geçici olarak ulaşılamıyor","code":"api_unreachable"}}';
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
